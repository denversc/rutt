#Kotlin
kotlin.code.style=official
# Suppress warnings from org.jetbrains.skiko.Library calling java.lang.System::load
# by specifying --enable-native-access=ALL-UNNAMED
kotlin.daemon.jvmargs=-Xmx3072M --enable-native-access=ALL-UNNAMED
#Gradle
# Suppress warnings from org.jetbrains.skiko.Library calling java.lang.System::load
# by specifying --enable-native-access=ALL-UNNAMED
org.gradle.jvmargs=-Xmx3072M -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED
org.gradle.configuration-cache=true
org.gradle.caching=true
